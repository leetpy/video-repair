<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频修复</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="mast">
          <div>
            <p class="eyebrow">Local video restore</p>
            <h1>视频修复</h1>
          </div>
          <div class="tool-status" id="toolStatus">检查工具中</div>
        </header>

        <form id="jobForm" class="panel">
          <label class="dropzone" for="video">
            <input id="video" name="video" type="file" accept=".avi,video/*" required />
            <span class="drop-icon">VR</span>
            <span class="drop-copy">
              <strong id="fileLabel">选择本地 AVI 视频</strong>
              <small>视频只在本机处理。输出默认保存在当前工作目录。</small>
            </span>
          </label>

          <div class="grid">
            <label>
              <span>FFmpeg</span>
              <input name="ffmpeg" id="ffmpeg" placeholder="ffmpeg" />
            </label>
            <label>
              <span>FFprobe</span>
              <input name="ffprobe" id="ffprobe" placeholder="ffprobe" />
            </label>
            <label class="wide">
              <span>Real-ESRGAN</span>
              <input name="realesrgan" id="realesrgan" placeholder="realesrgan-ncnn-vulkan" />
            </label>
            <label>
              <span>模型</span>
              <select name="model" id="model">
                <option value="realesrgan-x4plus">真实视频</option>
				<option value="realesr-animevideov3">轻量视频（偏动漫）</option>
                <option value="realesrgan-x4plus-anime">动漫图片风格</option>
              </select>
            </label>
            <label>
              <span>处理模式</span>
              <select name="upscaleMode" id="upscaleMode">
				<option value="turbo">极速 AI（轻量实验）</option>
				<option value="fast">快速修复（最快，跳过 AI）</option>
				<option value="efficient">AI 高画质（很慢）</option>
                <option value="gtx1060">GTX 1060 快速</option>
                <option value="quality">画质优先</option>
                <option value="x2">固定 AI x2</option>
                <option value="x4">固定 AI x4</option>
              </select>
            </label>
            <label>
              <span>目标分辨率</span>
              <select name="target" id="target">
				<option value="1080p">1080p 1920×1080</option>
				<option value="4k">4K 3840×2160</option>
				<option value="2k">2K 2560×1440</option>
                <option value="ai">只保留 AI 输出</option>
              </select>
            </label>
            <label>
              <span>Tile 显存控制</span>
              <input name="tileSize" id="tileSize" type="number" min="0" step="32" value="64" />
            </label>
			<label>
			  <span>预览帧数</span>
			  <input name="previewFrames" id="previewFrames" type="number" min="1" step="1" value="20" />
			</label>
            <label class="wide">
              <span>输出目录</span>
              <input name="outputFolder" id="outputFolder" placeholder="留空则保存到程序当前目录" />
            </label>
          </div>

          <div class="toggles" aria-label="处理选项">
            <label><input type="checkbox" name="denoise" checked /> <span>轻度降噪</span></label>
            <label><input type="checkbox" name="deinterlace" checked /> <span>去隔行</span></label>
          </div>

          <div class="actions">
            <button type="submit" id="startBtn">开始修复</button>
			<button type="button" id="previewBtn">预览前 20 帧</button>
            <button type="button" id="cancelBtn" disabled>取消</button>
          </div>
        </form>

        <section class="progress-panel" aria-live="polite">
          <div class="meter-head">
            <span id="stageText">等待视频</span>
            <span id="percentText">0%</span>
          </div>
          <div class="meter"><span id="meterBar"></span></div>
          <p id="resultText" class="result"></p>
		  <div id="previewArea" class="preview-area" hidden>
			<p id="previewTitle">修复预览 · 前 20 帧</p>
			<video id="previewPlayer" controls playsinline preload="metadata"></video>
		  </div>
        </section>
      </section>

      <aside class="console">
        <div class="console-head">
          <span>处理日志</span>
          <button type="button" id="clearLog">清空</button>
        </div>
        <pre id="log"></pre>
      </aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
